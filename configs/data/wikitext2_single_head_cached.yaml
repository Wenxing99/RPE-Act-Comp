  - On its day of release in Japan , Valkyria Chronicles III topped both platform
    @-@ exclusive and multi @-@ platform sales charts . By early February , the game
    sold 102 @,@ 779 units , coming in second overall to The Last Story for the Wii
    . By the end of the year , the game had sold just over 152 @,@ 500 units .
  - Famitsu enjoyed the story , and were particularly pleased with the improvements
    to gameplay . Japanese gaming site Game Watch Impress , despite negatively noting
    its pacing and elements recycled from previous games , was generally positive
    about its story and characters , and found its gameplay entertaining despite off
    @-@ putting difficulty spikes . 4Gamer.net writer Naohiko Misuosame , in a " Play
    Test " article based on the game 's PSN demo , felt that Valkyria Chronicles III
    provided a " profound feeling of closure " for the Valkyria Chronicles series
    . He praised its gameplay despite annoying limitations to aspects such as special
    abilities , and positively noted its shift in story to a tone similar to the first
    game .
  - PlayStation Official Magazine - UK praised the story 's blurring of Gallia 's
    moral standing , art style , and most points about its gameplay , positively noting
    the latter for both its continued quality and the tweaks to balance and content
    . Its one major criticism were multiple difficulty spikes , something that had
    affected the previous games . Heath Hindman of gaming website PlayStation Lifestyle
    praised the addition of non @-@ linear elements and improvements or removal of
    mechanics from Valkyria Chronicles II in addition to praising the returning gameplay
    style of previous games . He also positively noted the story 's serious tone .
    Points criticized in the review were recycled elements , awkward cutscenes that
    seemed to include all characters in a scene for no good reason , pacing issues
    , and occasional problems with the game 's AI .
  - In a preview of the TGS demo , Ryan Geddes of IGN was left excited as to where
    the game would go after completing the demo , along with enjoying the improved
    visuals over Valkyria Chronicles II . Kotaku 's Richard Eisenbeis was highly positive
    about the game , citing is story as a return to form after Valkyria Chronicles
    II and its gameplay being the best in the series . His main criticisms were its
    length and gameplay repetition , along with expressing regret that it would not
    be localized .
