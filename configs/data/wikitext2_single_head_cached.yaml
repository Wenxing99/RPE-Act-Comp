  - Robert Boulter is an English film , television and theatre actor . He had a guest
    @-@ starring role on the television series The Bill in 2000 . This was followed
    by a starring role in the play Herons written by Simon Stephens , which was performed
    in 2001 at the Royal Court Theatre . He had a guest role in the television series
    Judge John Deed in 2002 . In 2004 Boulter landed a role as " Craig " in the episode
    " Teddy 's Story " of the television series The Long Firm ; he starred alongside
    actors Mark Strong and Derek Jacobi . He was cast in the 2005 theatre productions
    of the Philip Ridley play Mercury Fur , which was performed at the Drum Theatre
    in Plymouth and the Menier Chocolate Factory in London . He was directed by John
    Tiffany and starred alongside Ben Whishaw , Shane Zaza , Harry Kent , Fraser Ayres
    , Sophie Stanton and Dominic Hall .
  - In 2006 , Boulter starred alongside Whishaw in the play Citizenship written by
    Mark Ravenhill . He appeared on a 2006 episode of the television series , Doctors
    , followed by a role in the 2007 theatre production of How to Curse directed by
    Josie Rourke . How to Curse was performed at Bush Theatre in the London Borough
    of Hammersmith and Fulham . Boulter starred in two films in 2008 , Daylight Robbery
    by filmmaker Paris Leonti , and Donkey Punch directed by Olly Blackburn . In May
    2008 , Boulter made a guest appearance on a two @-@ part episode arc of the television
    series Waking the Dead , followed by an appearance on the television series Survivors
    in November 2008 . He had a recurring role in ten episodes of the television series
    Casualty in 2010 , as " Kieron Fletcher " . Boulter starred in the 2011 film Mercenaries
    directed by Paris Leonti .
  - In 2000 Boulter had a guest @-@ starring role on the television series The Bill
    ; he portrayed " Scott Parry " in the episode , " In Safe Hands " . Boulter starred
    as " Scott " in the play Herons written by Simon Stephens , which was performed
    in 2001 at the Royal Court Theatre . A review of Boulter 's performance in The
    Independent on Sunday described him as " horribly menacing " in the role , and
    he received critical reviews in The Herald , and Evening Standard . He appeared
    in the television series Judge John Deed in 2002 as " Addem Armitage " in the
    episode " Political Expediency " , and had a role as a different character " Toby
    Steele " on The Bill .
  - 'He had a recurring role in 2003 on two episodes of The Bill , as character "
    Connor Price " . In 2004 Boulter landed a role as " Craig " in the episode " Teddy
    ''s Story " of the television series The Long Firm ; he starred alongside actors
    Mark Strong and Derek Jacobi . Boulter starred as " Darren " , in the 2005 theatre
    productions of the Philip Ridley play Mercury Fur . It was performed at the Drum
    Theatre in Plymouth , and the Menier Chocolate Factory in London . He was directed
    by John Tiffany and starred alongside Ben Whishaw , Shane Zaza , Harry Kent ,
    Fraser Ayres , Sophie Stanton and Dominic Hall . Boulter received a favorable
    review in The Daily Telegraph : " The acting is shatteringly intense , with wired
    performances from Ben Whishaw ( now unrecognisable from his performance as Trevor
    Nunn ''s Hamlet ) , Robert Boulter , Shane Zaza and Fraser Ayres . " The Guardian
    noted , " Ben Whishaw and Robert Boulter offer tenderness amid the savagery .
    "'
  - 'In 2006 Boulter starred in the play Citizenship written by Mark Ravenhill . The
    play was part of a series which featured different playwrights , titled Burn /
    Chatroom / Citizenship . In a 2006 interview , fellow actor Ben Whishaw identified
    Boulter as one of his favorite co @-@ stars : " I loved working with a guy called
    Robert Boulter , who was in the triple bill of Burn , Chatroom and Citizenship
    at the National . He played my brother in Mercury Fur . " He portrayed " Jason
    Tyler " on the 2006 episode of the television series , Doctors , titled " Something
    I Ate " . Boulter starred as " William " in the 2007 production of How to Curse
    directed by Josie Rourke . How to Curse was performed at Bush Theatre in the London
    Borough of Hammersmith and Fulham . In a review of the production for The Daily
    Telegraph , theatre critic Charles Spencer noted , " Robert Boulter brings a touching
    vulnerability to the stage as William . "'
  - 'Boulter starred in two films in 2008 , Daylight Robbery by filmmaker Paris Leonti
    , and Donkey Punch directed by Olly Blackburn . Boulter portrayed a character
    named " Sean " in Donkey Punch , who tags along with character " Josh " as the
    " quiet brother ... who hits it off with Tammi " . Boulter guest starred on a
    two @-@ part episode arc " Wounds " in May 2008 of the television series Waking
    the Dead as character " Jimmy Dearden " . He appeared on the television series
    Survivors as " Neil " in November 2008 . He had a recurring role in ten episodes
    of the television series Casualty in 2010 , as " Kieron Fletcher " . He portrayed
    an emergency physician applying for a medical fellowship . He commented on the
    inherent difficulties in portraying a physician on television : " Playing a doctor
    is a strange experience . Pretending you know what you ''re talking about when
    you don ''t is very bizarre but there are advisers on set who are fantastic at
    taking you through procedures and giving you the confidence to stand there and
    look like you know what you ''re doing . " Boulter starred in the 2011 film Mercenaries
    directed by Paris Leonti .'
  - 'Du Fu ( Wade – Giles : Tu Fu ; Chinese : 杜甫 ; 712 – 770 ) was a prominent Chinese
    poet of the Tang dynasty . Along with Li Bai ( Li Po ) , he is frequently called
    the greatest of the Chinese poets . His greatest ambition was to serve his country
    as a successful civil servant , but he proved unable to make the necessary accommodations
    . His life , like the whole country , was devastated by the An Lushan Rebellion
    of 755 , and his last 15 years were a time of almost constant unrest .'
  - Although initially he was little @-@ known to other writers , his works came to
    be hugely influential in both Chinese and Japanese literary culture . Of his poetic
    writing , nearly fifteen hundred poems have been preserved over the ages . He
    has been called the " Poet @-@ Historian " and the " Poet @-@ Sage " by Chinese
    critics , while the range of his work has allowed him to be introduced to Western
    readers as " the Chinese Virgil , Horace , Ovid , Shakespeare , Milton , Burns
    , Wordsworth , Béranger , Hugo or Baudelaire " .
